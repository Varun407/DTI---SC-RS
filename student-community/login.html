<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Register - UniHub</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- Header & Navigation -->
    <header>
        <div class="container nav">
            <div class="logo">
                <a href="index.html" style="color: white;">UniHub</a>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Back to Home</a></li>
            </ul>
        </div>
    </header>

    <div class="container">
        <div class="form-container">
            <h2>Student Login</h2>
            <form action="index.html">
                <div class="form-group">
                    <label for="email">College Email Address:</label>
                    <input type="email" id="email" name="email" placeholder="Enter your .edu email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>
                
                <button type="submit" class="btn" style="width: 100%; margin-top: 10px;">Login</button>
            </form>
            
            <p style="text-align: center; margin-top: 20px; font-size: 14px;">
                Don't have an account? <a href="#" style="font-weight: bold;">Register Here</a>
            </p>
        </div>
    </div>

    <!-- Footer -->
    <footer style="position: absolute; bottom: 0; width: 100%;">
        <div class="container">
            <p><strong>UniHub - A Student Mini Project</strong></p>
            <p>&copy; 2026 College Student Community</p>
        </div>
    </footer>

</body>
</html>
